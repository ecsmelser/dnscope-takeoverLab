id: custom-takeover

info:
  name: dnscope suspicious service disconnect review
  author: ethan
  severity: medium
  description: |
    flags a subdomain for review when it resolves through a cname
    and the live response contains disconnected or unclaimed
    service language.
  tags:
    - dnscope
    - dns
    - http
    - review
    - takeover
    - misconfig

dns:
  - name: "{{FQDN}}"
    type: CNAME

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    redirects: true
    max-redirects: 3

    matchers-condition: and
    matchers:
      - type: dsl
        name: has-cname
        dsl:
          - len(dns_cname) > 0

      - type: word
        name: disconnect-keywords
        part: body
        condition: or
        words:
          - "this resource is unclaimed"
          - "resource is unclaimed"
          - "no such app"
          - "project not found"
          - "site not found"
          - "resource not found"
          - "service unavailable"
          - "there is no site here"
          - "deployment not found"
          - "unknown site"
          - "account suspended"
          - "404There"

      - type: status
        name: suspicious-status
        status:
          - 200
          - 403
          - 404
          - 410
